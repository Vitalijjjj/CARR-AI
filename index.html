<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Cruze — Elite Luxury Cars</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;500&family=Orbitron:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#ffffff;
      --ink:#0A0F14;
      --muted:#626970;
      --line:#E0E3E6;
      --soft:#F2F3F4;
      --accent:#1565C0;
      --accent-ink:#ffffff;
      --radius-sm:8px;
      --radius-md:12px;
      --radius-lg:16px;
      --radius-pill:100px;
      --sans:'Lexend Deca', system-ui, sans-serif;
      --display:'Orbitron', system-ui, sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-weight:300;font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased}
    img{max-width:100%;display:block}
    button{font:inherit;border:0;background:none;color:inherit;cursor:pointer}
    a{color:inherit;text-decoration:none}
    #root{display:contents}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
